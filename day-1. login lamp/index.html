<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login Lamp Pro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- Lamp -->
        <div class="lamp" onclick="toggleLamp()">
            <div class="lamp-head"></div>
            <div class="lamp-string"></div>
            <div class="lamp-knob"></div>
            <div class="lamp-stand"></div>
            <div class="lamp-base"></div>
            <div class="light"></div>
        </div>

        <!-- Login Card -->
        <div class="login-card" id="loginCard">
            <h2>Welcome</h2>

            <input type="text" placeholder="Username" value="the_coding_wizard">
            <input type="password" placeholder="Password" value="123456">

            <button>Sign In</button>
        </div>

    </div>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <!-- Sound -->
    <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <script src="app.js"></script>
</body>

</html>
